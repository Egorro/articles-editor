<div class="article-list">
  @for (item of list(); track $index) {
    <div
      class="article-item"
      [class.article-item--active]="currentArticle()?.id === item.id"
      (click)="select.emit(item.id)"
    >
      <div>
        <div>{{ item.id }}</div>
        <div>{{ item.name }}</div>
      </div>
      <button (click)="delete.emit(item.id)">X</button>
    </div>
  } @empty {
    <div>No data</div>
  }
  <button (click)="addNew.emit()">Добавить новую</button>
</div>
